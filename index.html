  C:[{id:'deadlift',name:'デッドリフト',sets:3,reps:'5-6'},{id:'rdl',name:'RDL',sets:3,reps:'8-10'},{id:'pullupC',name:'懸垂',sets:3,reps:'限界',bw:true},{id:'hanglegraise',name:'ハンギングレッグレイズ',sets:3,reps:'10-15',bw:true}]
};
const DN=['日','月','火','水','木','金','土'];

// ── State ──
let S={user:null,authOk:false,dataOk:false,
  // routine
  tasks:[],comps:{},rView:'home',rDate:fmtD(new Date()),editId:null,pop:null,form:{name:'',days:[0,1,2,3,4,5,6],icon:'✅'},
  // fitness
  fit:{workouts:{},runs:{},weight:{},meals:{}},fDate:fmtD(new Date()),fTab:'log',reports:[],reportIdx:0,
  // global
  tab:'routine',toast:null,unsub:[]};
let toastT;

// ── Helpers ──
function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseD(s){const[y,m,d]=s.split('-');return new Date(y,m-1,d);}
function tdi(){return DAY_MAP[new Date().getDay()];}
function greet(){const h=new Date().getHours();return h<12?'おはよう':h<17?'こんにちは':'おつかれさま';}
function dlabel(){const d=new Date(),w=DN[d.getDay()];return `${d.getMonth()+1}月${d.getDate()}日（${w}）`;}
function dlStr(days){return days.length===7?'毎日':days.map(i=>DAYS[i]).join('・');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m){S.toast=m;render();clearTimeout(toastT);toastT=setTimeout(()=>{S.toast=null;render();},1800);}

// ── Firebase ──
function startSync(uid){
  S.unsub.forEach(u=>u());S.unsub=[];
  S.unsub.push(onSnapshot(doc(db,'users',uid,'data','tasks'),s=>{if(s.exists())S.tasks=s.data().items||[];S.dataOk=true;render();}));
  S.unsub.push(onSnapshot(doc(db,'users',uid,'data','completions'),s=>{if(s.exists())S.comps=s.data().entries||{};render();}));
  S.unsub.push(onSnapshot(doc(db,'users',uid,'data','fitness'),s=>{if(s.exists()){const d=s.data();S.fit={workouts:d.workouts||{},runs:d.runs||{},weight:d.weight||{},meals:d.meals||{}};}render();}));
  S.unsub.push(onSnapshot(doc(db,'users',uid,'data','reports'),s=>{if(s.exists()){S.reports=s.data().items||[];}render();}));
}
async function saveR(){if(S.user)try{await setDoc(doc(db,'users',S.user.uid,'data','tasks'),{items:S.tasks});}catch(e){}}
async function saveC(){if(S.user)try{await setDoc(doc(db,'users',S.user.uid,'data','completions'),{entries:S.comps});}catch(e){}}
async function saveF(){if(S.user)try{await setDoc(doc(db,'users',S.user.uid,'data','fitness'),S.fit);}catch(e){}}

onAuthStateChanged(auth,u=>{S.user=u;S.authOk=true;if(u)startSync(u.uid);else{S.dataOk=false;S.tasks=[];S.comps={};S.fit={workouts:{},runs:{},weight:{},meals:{}};render();}});
getRedirectResult(auth).catch(()=>{});
async function login(){const p=new GoogleAuthProvider();try{await signInWithPopup(auth,p);}catch(e){if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user')await signInWithRedirect(auth,p);}}
async function logout(){S.unsub.forEach(u=>u());S.unsub=[];await signOut(auth);}

// ── Routine logic ──
function isRToday(){return S.rDate===fmtD(new Date());}
function rDateObj(){return parseD(S.rDate);}
function rDateDayIdx(){return DAY_MAP[rDateObj().getDay()];}
function dateTasks(dateStr){const d=parseD(dateStr);return S.tasks.filter(t=>t.days.includes(DAY_MAP[d.getDay()]));}
function todayTasks(){return dateTasks(fmtD(new Date()));}
function yesterdayDate(){const d=new Date();d.setDate(d.getDate()-1);return d;}
function yesterdayCarryover(){
  const yd=yesterdayDate(),ydi=DAY_MAP[yd.getDay()],yds=fmtD(yd);
  const todayIds=new Set(todayTasks().map(t=>t.id));
  return S.tasks.filter(t=>t.days.includes(ydi)&&!S.comps[`${yds}:${t.id}`]&&!todayIds.has(t.id));
}
function viewTasks(){
  if(isRToday())return [...todayTasks(),...yesterdayCarryover()];
  return dateTasks(S.rDate);
}
function isCarryover(id){return isRToday()&&yesterdayCarryover().some(t=>t.id===id);}
function compDateFor(id){return isCarryover(id)?fmtD(yesterdayDate()):S.rDate;}
function isComp(id){return !!S.comps[`${compDateFor(id)}:${id}`];}
function toggleComp(id){const k=`${compDateFor(id)}:${id}`;if(S.comps[k])delete S.comps[k];else S.comps[k]=Date.now();saveC();render();}
function getStreak(t){let s=0;const d=new Date();if(t.days.includes(DAY_MAP[d.getDay()])&&S.comps[`${fmtD(d)}:${t.id}`])s=1;d.setDate(d.getDate()-1);for(let i=0;i<365;i++){if(t.days.includes(DAY_MAP[d.getDay()])){if(S.comps[`${fmtD(d)}:${t.id}`])s++;else break;}d.setDate(d.getDate()-1);}return s;}
function rPct(){const t=viewTasks();return t.length?Math.round(t.filter(x=>isComp(x.id)).length/t.length*100):0;}
function rDateLabel(){const d=rDateObj(),w=DN[d.getDay()];return `${d.getMonth()+1}月${d.getDate()}日（${w}）`;}

// ── Fitness helpers ──
function getPrev(exId,beforeDate){const dates=Object.keys(S.fit.workouts).filter(d=>d<beforeDate).sort().reverse();for(const d of dates){const w=S.fit.workouts[d];if(w&&w[exId])return w[exId];}return null;}

// ── Render ──
function render(){
  const a=document.getElementById('app');
  if(!S.authOk){a.innerHTML='<div class="lw"><div class="sp"></div></div>';return;}
  if(!S.user){a.innerHTML=renderLogin();bind();return;}
  if(!S.dataOk){a.innerHTML='<div class="lw"><div class="sp"></div></div>';return;}
  let html='';
  if(S.tab==='routine'){
    html=S.rView==='week'?renderWeek():(S.rView==='add'||S.rView==='edit')?renderRForm():renderRHome();
  }else{
    html=renderFitness();
  }
  html+=renderBTabs();
  if(S.toast)html+=`<div class="toast">${esc(S.toast)}</div>`;
  a.innerHTML=html;
  bind();
}

function renderLogin(){return `<div class="login-wrap"><div class="login-icon">🌱</div><div class="login-title">Daily</div><div class="login-desc">ルーティン＆フィットネス管理<br>デバイス間で自動同期</div><button class="login-btn" data-a="login"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">Googleでログイン</button></div>`;}

function renderBTabs(){return `<div class="btabs"><button class="btab ${S.tab==='routine'?'active':''}" data-a="switchTab" data-v="routine"><span class="btab-icon">✅</span>ルーティン</button><button class="btab ${S.tab==='fitness'?'active':''}" data-a="switchTab" data-v="fitness"><span class="btab-icon">💪</span>トレーニング</button></div>`;}

// ── Routine views ──
function renderRHome(){
  const tasks=viewTasks(),p=rPct(),done=tasks.filter(t=>isComp(t.id)).length,c=2*Math.PI*46;
  const sorted=[...tasks].sort((a,b)=>(isComp(a.id)?1:0)-(isComp(b.id)?1:0));
  const today=isRToday();
  return `<div class="app-inner">
    <div class="header"><div><div class="date-label">${today?dlabel():rDateLabel()}</div><div class="greeting">${today?greet():'入力修正'}</div></div><div style="display:flex;gap:6px"><button class="hbtn" data-a="week" title="週間スケジュール">📅</button><button class="hbtn" data-a="logout" title="ログアウト">↗</button></div></div>
    <div class="dn"><button class="dnb" data-a="rPrev">◀</button><div class="dnc"><div class="dnd">${rDateLabel()}${today?'<span class="today-badge">TODAY</span>':''}</div></div>${today?'':'<button class="dnb" data-a="rNext">▶</button>'}<button class="dnb" data-a="rToday" title="今日" style="${today?'opacity:.3;pointer-events:none':''}">●</button></div>
    <div class="pw"><div class="rc"><svg viewBox="0 0 104 104"><defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E8A842"/><stop offset="100%" stop-color="#D4793A"/></linearGradient></defs><circle cx="52" cy="52" r="46" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/><circle cx="52" cy="52" r="46" fill="none" stroke="url(#rg)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${(p/100)*c} ${c}" transform="rotate(-90 52 52)" style="transition:stroke-dasharray .7s cubic-bezier(.4,0,.2,1)"/></svg><div class="rt"><div class="rp">${p}%</div><div class="rs">${done}/${tasks.length}</div></div></div></div>
    ${tasks.length===0?`<div class="empty"><div class="ei">${today?'🌱':'📭'}</div><div class="et">${today?'ルーティンを始めましょう':'この日のタスクはありません'}</div><div class="ed">${today?'＋ボタンからタスクを追加':''}</div></div>`:`<div class="tl">${sorted.map((t,i)=>{const d=isComp(t.id),sk=today?getStreak(t):0,co=isCarryover(t.id);return`<div class="tc ${d?'done':''}" style="animation-delay:${i*.04}s;${S.pop===t.id?'z-index:20':''}"><button class="cb ${d?'ck':''}" data-a="toggle" data-id="${t.id}">${d?'✓':''}</button><div class="tb" data-a="toggle" data-id="${t.id}"><div class="tn">${t.icon} ${esc(t.name)}${co?' <span style="font-size:10px;color:var(--accent);font-weight:700;background:var(--aglow);padding:1px 6px;border-radius:4px">昨日</span>':''}</div>${sk>0?`<div class="st">🔥 ${sk}回連続</div>`:''}${t.days.length<7&&!co?`<div class="td">${dlStr(t.days)}</div>`:''}</div>${today?`<button class="mb" data-a="more" data-id="${t.id}">⋯</button>${S.pop===t.id?`<div class="po"><button class="pb edt" data-a="edit" data-id="${t.id}">✏️ 編集</button><button class="pb del" data-a="delete" data-id="${t.id}">🗑 削除</button></div>`:''}`:''}</div>`;}).join('')}</div>`}
  </div>${today?'<button class="fab" data-a="add">＋</button>':''}${S.pop?'<div class="bd" data-a="closepop"></div>':''}`;
}

function renderRForm(){
  const e=S.rView==='edit',f=S.form;
  return `<div class="app-inner fv"><div class="stl">${e?'ルーティンを編集':'新しいルーティン'}</div>
    <div class="ig"><label class="il">タスク名</label><input class="ti" id="ni" value="${esc(f.name)}" placeholder="例: 朝のストレッチ" autofocus></div>
    <div class="ig"><label class="il">繰り返し</label><div class="ps"><button class="psb" data-a="preset" data-v="all">毎日</button><button class="psb" data-a="preset" data-v="wd">平日</button><button class="psb" data-a="preset" data-v="we">週末</button></div><div class="dg">${DAYS.map((d,i)=>`<button class="db ${f.days.includes(i)?'ac':''}" data-a="dayT" data-idx="${i}">${d}</button>`).join('')}</div></div>
    <div class="ig"><label class="il">アイコン</label><div class="icg">${R_ICONS.map(ic=>`<button class="icb ${f.icon===ic?'ac':''}" data-a="icon" data-v="${ic}">${ic}</button>`).join('')}</div></div>
    <div class="fa"><button class="bc" data-a="cancel">キャンセル</button><button class="bs" data-a="save" ${f.name.trim()&&f.days.length?'':'disabled'}>${e?'保存する':'追加する'}</button></div></div>`;
}

// ── Week schedule view ──
function renderWeek(){
  const ti=tdi();
  let html=`<div class="app-inner fv"><div class="stl">📅 週間スケジュール</div>`;
  for(let d=0;d<7;d++){
    const isToday=d===ti;
    const dayTasks=S.tasks.filter(t=>t.days.includes(d));
    html+=`<div class="wk-day"><div class="wk-label"><span class="${isToday?'wk-today':''}">${DAYS[d]}</span>${isToday?'<span style="font-size:10px;color:var(--dim)">今日</span>':''}</div>`;
    if(dayTasks.length){
      html+=`<div class="wk-tasks">${dayTasks.map(t=>`<div class="wk-task">${t.icon} ${esc(t.name)}</div>`).join('')}</div>`;
    }else{
      html+=`<div class="wk-none">タスクなし</div>`;
    }
    html+=`</div>`;
  }
  html+=`<div class="fa"><button class="bc" data-a="weekBack" style="flex:1">← 戻る</button></div></div>`;
  return html;
}

// ── Fitness views ──
function renderFitness(){
  const sel=parseD(S.fDate),dow=sel.getDay(),sch=SCHEDULE[dow],isToday=S.fDate===fmtD(new Date());
  return `<div class="app-inner fit-wrap">
    <div class="fit-header"><div class="fit-title">FITNESS TRACKER</div><div class="fit-subtitle">173cm / 65kg / HRmax 198 / VO₂max 50</div><button class="hbtn" style="position:absolute;right:0;top:20px" data-a="logout">↗</button></div>
    <div class="fit-dn"><button class="fit-dnb" data-a="dPrev">◀</button><div class="fit-dnc"><div class="fit-dnd">${sel.getMonth()+1}/${sel.getDate()}（${DN[dow]}）${isToday?'<span class="fit-today">TODAY</span>':''}</div><div class="fit-dns">${sch.label}</div></div><button class="fit-dnb" data-a="dNext">▶</button></div>
    <div class="fit-tabs"><button class="fit-tab ${S.fTab==='log'?'active':''}" data-a="fTab" data-v="log">記録</button><button class="fit-tab ${S.fTab==='summary'?'active':''}" data-a="fTab" data-v="summary">週次</button><button class="fit-tab ${S.fTab==='report'?'active':''}" data-a="fTab" data-v="report">アドバイス${S.reports.length?'<span style="margin-left:4px;font-size:9px;background:#4ade80;color:#0a0a0f;padding:1px 5px;border-radius:3px;font-weight:700">'+S.reports.length+'</span>':''}</button><button class="fit-tab" data-a="fToday" style="${isToday?'opacity:.3':''}">今日</button></div>
    ${S.fTab==='report'?renderFReport():S.fTab==='log'?renderFLog(sch):renderFSummary()}
  </div>`;
}

function renderFLog(sch){
  const d=S.fDate;
  let html='';
  if(sch.type==='workout'&&sch.w){
    const exercises=WORKOUTS[sch.w];
    const saved=S.fit.workouts[d]||{};
    html+=`<div class="fit-section"><div class="fit-sh"><span class="fit-sh-icon">🏋️</span><span>${sch.label}</span></div>`;
    exercises.forEach(ex=>{
      const prev=getPrev(ex.id,d);
      const data=saved[ex.id]||{};
      html+=`<div class="fit-ex"><div class="fit-ex-name">${ex.name}${ex.bw?'<span class="fit-bw">自重</span>':''}</div>`;
      html+=`<div class="fit-ex-meta">目標: ${ex.reps}`;
      if(prev){
        if(ex.bw){html+=` <span class="fit-prev">| 前回: ${prev.s1r||prev.s2r||prev.s3r||'-'}回</span>`;}
        else{html+=` <span class="fit-prev">| 前回: ${prev.s1w||'-'}kg × ${prev.s1r||'-'}</span>`;}
      }
      html+=`</div><div class="fit-sets">`;
      for(let i=1;i<=ex.sets;i++){
        if(ex.bw){
          html+=`<div class="fit-sr"><span class="fit-sl">Set ${i}</span><input class="fit-in-bw" data-a="fSet" data-ex="${ex.id}" data-s="s${i}r" value="${data[`s${i}r`]||''}" placeholder="reps" inputmode="numeric"><span class="fit-sep">回</span></div>`;
        }else{
          html+=`<div class="fit-sr"><span class="fit-sl">Set ${i}</span><input class="fit-in" data-a="fSet" data-ex="${ex.id}" data-s="s${i}w" value="${data[`s${i}w`]||''}" placeholder="kg" inputmode="decimal"><span class="fit-sep">×</span><input class="fit-in" data-a="fSet" data-ex="${ex.id}" data-s="s${i}r" value="${data[`s${i}r`]||''}" placeholder="reps" inputmode="numeric"></div>`;
        }
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }else if(sch.type==='run'){
    const r=S.fit.runs[d]||{};
    const dist=parseFloat(r.distance)||0,dur=parseFloat(r.duration)||0;
    let autoPace='—';
    if(dist>0&&dur>0){const pt=dur/dist;autoPace=`${Math.floor(pt)}:${String(Math.round((pt-Math.floor(pt))*60)).padStart(2,'0')}`;}
    html+=`<div class="fit-section"><div class="fit-sh"><span class="fit-sh-icon">🏃</span><span>${sch.label}</span></div>
      <div class="fit-rc">
        <div class="fit-rr"><div class="fit-rf"><label class="fit-fl">距離 (km)</label><input class="fit-iw" data-a="fRun" data-f="distance" value="${r.distance||''}" placeholder="5.0" inputmode="decimal"></div><div class="fit-rf"><label class="fit-fl">時間 (分)</label><input class="fit-iw" data-a="fRun" data-f="duration" value="${r.duration||''}" placeholder="40" inputmode="numeric"></div></div>
        <div class="fit-rr"><div class="fit-rf"><label class="fit-fl">平均心拍 (bpm)</label><input class="fit-iw" data-a="fRun" data-f="hr" value="${r.hr||''}" placeholder="145" inputmode="numeric"></div><div class="fit-rf"><label class="fit-fl">ペース (/km)</label><div class="fit-pace">${autoPace}</div></div></div>
        <div class="fit-rf"><label class="fit-fl">メモ</label><input class="fit-iw" data-a="fRun" data-f="note" value="${esc(r.note||'')}" placeholder="体調、天気など"></div>
      </div>
    </div>`;
  }else{
    html+=`<div class="fit-rest"><div style="font-size:36px;margin-bottom:8px">🧘</div><div class="fit-rest-t">完全休養日</div><div class="fit-rest-s">ストレッチやモビリティワークはOK</div></div>`;
  }
  // Weight & Meal
  const wVal=S.fit.weight[d]||'';
  const mVal=S.fit.meals[d]||'';
  html+=`<div class="fit-section"><div class="fit-sh"><span class="fit-sh-icon">📊</span><span>体重 & 食事</span></div>
    <div class="fit-ec">
      <div class="fit-rf"><label class="fit-fl">体重 (kg)</label><input class="fit-iw" data-a="fWeight" value="${wVal}" placeholder="65.0" inputmode="decimal"></div>
      <div class="fit-rf"><label class="fit-fl">食事メモ（タンパク質量など）</label><textarea class="fit-ta" data-a="fMeal" placeholder="例: P120g、フェイジョン多め">${esc(mVal)}</textarea></div>
    </div>
  </div>`;
  return html;
}

function renderFSummary(){
  const sel=parseD(S.fDate),day=sel.getDay(),diff=day===0?6:day-1;
  const ws=new Date(sel);ws.setDate(ws.getDate()-diff);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  let wkCount=0,runCount=0,totalDist=0,weights=[],prs={},bwPrs={};
  const allEx=[...WORKOUTS.A,...WORKOUTS.B,...WORKOUTS.C];
  const exMap={};const bwMap={};allEx.forEach(e=>{exMap[e.id]=e.name;if(e.bw)bwMap[e.id]=true;});
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);const ds=fmtD(d),dow=d.getDay(),sch=SCHEDULE[dow];
    if(S.fit.weight[ds])weights.push(parseFloat(S.fit.weight[ds]));
    if(sch.type==='workout'&&S.fit.workouts[ds]){wkCount++;const w=S.fit.workouts[ds];Object.entries(w).forEach(([exId,data])=>{
      if(bwMap[exId]){for(let s=1;s<=3;s++){const r=parseFloat(data[`s${s}r`]);if(r&&(!bwPrs[exId]||r>bwPrs[exId]))bwPrs[exId]=r;}}
      else{for(let s=1;s<=3;s++){const wt=parseFloat(data[`s${s}w`]);if(wt&&(!prs[exId]||wt>prs[exId]))prs[exId]=wt;}}
    });}
    if(sch.type==='run'&&S.fit.runs[ds]&&S.fit.runs[ds].distance){runCount++;totalDist+=parseFloat(S.fit.runs[ds].distance)||0;}
  }
  const avgW=weights.length?Math.round(weights.reduce((a,b)=>a+b,0)/weights.length*10)/10:null;

  let html=`<div class="fit-section"><div class="fit-sh"><span class="fit-sh-icon">📋</span><span>週次サマリー</span></div>`;
  html+=`<div class="fit-sp">${ws.getMonth()+1}/${ws.getDate()} 〜 ${we.getMonth()+1}/${we.getDate()}</div>`;
  html+=`<div class="fit-sg"><div class="fit-si"><div class="fit-sv">${wkCount}</div><div class="fit-sla">筋トレ</div></div><div class="fit-si"><div class="fit-sv">${runCount}</div><div class="fit-sla">ラン</div></div><div class="fit-si"><div class="fit-sv">${totalDist.toFixed(1)}</div><div class="fit-sla">走行km</div></div><div class="fit-si"><div class="fit-sv">${avgW||'—'}</div><div class="fit-sla">平均体重</div></div></div>`;

  if(Object.keys(prs).length>0||Object.keys(bwPrs).length>0){
    html+=`<div class="fit-ps"><div class="fit-pt">今週の最大重量</div>`;
    Object.entries(prs).forEach(([id,w])=>{html+=`<div class="fit-pr"><span>${exMap[id]||id}</span><span class="fit-pw">${w}kg</span></div>`;});
    Object.entries(bwPrs).forEach(([id,r])=>{html+=`<div class="fit-pr"><span>${exMap[id]||id}</span><span class="fit-pw">${r}回</span></div>`;});
    html+=`</div>`;
  }

  html+=`<div class="fit-wd"><div class="fit-pt">日別ログ</div>`;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);const ds=fmtD(d),dow=d.getDay(),sch=SCHEDULE[dow];
    let done=false;
    if(sch.type==='workout')done=!!S.fit.workouts[ds];
    else if(sch.type==='run')done=!!S.fit.runs[ds]&&!!S.fit.runs[ds].distance;
    else done=true;
    html+=`<div class="fit-wr" style="opacity:${done?1:.5}"><span class="fit-wn">${DN[dow]} ${d.getDate()}</span><span class="fit-wt">${sch.label}</span><span class="${done?'fit-wdone':'fit-wpend'}">${done?'✓':'—'}</span></div>`;
  }
  html+=`</div>`;

  html+=`</div>`;
  return html;
}

function renderFReport(){
  if(!S.reports.length)return `<div class="fit-section"><div class="fit-rest"><span style="font-size:36px;display:block;margin-bottom:8px">🏋️</span><div class="fit-rest-t">トレーナーアドバイスはまだありません</div><div class="fit-rest-s">毎週金曜8:00に自動生成されます</div></div></div>`;
  const r=S.reports[S.reportIdx]||S.reports[0];
  let html=`<div class="fit-section">`;
  if(S.reports.length>1)html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><button class="fit-dnb" data-a="rPrev" ${S.reportIdx>=S.reports.length-1?'style="opacity:.3"':''}>◀</button><span style="font-size:12px;color:#6b6b80">${r.date}（${S.reportIdx+1}/${S.reports.length}）</span><button class="fit-dnb" data-a="rNext" ${S.reportIdx<=0?'style="opacity:.3"':''}>▶</button></div>`;
  else html+=`<div style="text-align:center;margin-bottom:12px;font-size:12px;color:#6b6b80">${r.date}</div>`;
  html+=`<div class="fit-report-body">${mdToHtml(r.content)}</div></div>`;
  return html;
}
function mdToHtml(md){
  return md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:#4ade80;margin:16px 0 6px">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="font-size:14px;font-weight:700;color:#e8e8f0;margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid #1e1e30">$1</div>')
    .replace(/^# (.+)$/gm,'<div style="font-size:15px;font-weight:700;color:#4ade80;margin:16px 0 10px">$1</div>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:#e8e8f0">$1</strong>')
    .replace(/^\| (.+)$/gm,r=>{const cells=r.split('|').filter(c=>c.trim());if(cells.every(c=>/^[\s-:]+$/.test(c)))return '';return '<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid #1e1e30;font-size:11px">'+cells.map(c=>'<span style="flex:1">'+c.trim()+'</span>').join('')+'</div>';})
    .replace(/^- (.+)$/gm,'<div style="padding:2px 0 2px 12px;font-size:12px;position:relative"><span style="position:absolute;left:0;color:#4ade80">•</span>$1</div>')
    .replace(/^&gt; (.+)$/gm,'<div style="border-left:2px solid #4ade80;padding:6px 12px;margin:8px 0;font-size:12px;color:#6b6b80;font-style:italic">$1</div>')
    .replace(/---/g,'<div style="border-top:1px solid #1e1e30;margin:12px 0"></div>')
    .replace(/\n\n/g,'<div style="height:8px"></div>')
    .replace(/\n/g,'<br>');
}

// ── Events ──
function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>{if(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA')el.addEventListener('click',handleA);});
  document.querySelectorAll('[data-a]').forEach(el=>{if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.addEventListener('change',handleA);});
  const ni=document.getElementById('ni');
  if(ni)ni.addEventListener('input',e=>{S.form.name=e.target.value;const b=document.querySelector('[data-a="save"]');if(b)b.disabled=!(S.form.name.trim()&&S.form.days.length);});
}

function handleA(e){
  const el=e.currentTarget,a=el.dataset.a,id=el.dataset.id,v=el.dataset.v;
  switch(a){
    case 'login':login();break;
    case 'logout':logout();break;
    case 'switchTab':S.tab=v;S.rView='home';S.rDate=fmtD(new Date());S.pop=null;render();break;
    // Routine
    case 'toggle':toggleComp(id);break;
    case 'more':e.stopPropagation();S.pop=S.pop===id?null:id;render();break;
    case 'closepop':S.pop=null;render();break;
    case 'delete':S.tasks=S.tasks.filter(t=>t.id!==id);S.pop=null;saveR();toast('削除しました');break;
    case 'edit':{const tk=S.tasks.find(t=>t.id===id);if(tk){S.form={name:tk.name,days:[...tk.days],icon:tk.icon};S.editId=id;S.rView='edit';S.pop=null;render();}}break;
    case 'add':S.form={name:'',days:[0,1,2,3,4,5,6],icon:'✅'};S.rView='add';render();break;
    case 'rPrev':{const d=rDateObj();d.setDate(d.getDate()-1);S.rDate=fmtD(d);render();}break;
    case 'rNext':{const d=rDateObj();d.setDate(d.getDate()+1);if(fmtD(d)<=fmtD(new Date())){S.rDate=fmtD(d);}render();}break;
    case 'rToday':S.rDate=fmtD(new Date());render();break;
    case 'week':S.rView='week';S.pop=null;render();break;
    case 'weekBack':S.rView='home';render();break;
    case 'cancel':S.rView='home';S.editId=null;render();break;
    case 'save':
      if(!S.form.name.trim()||!S.form.days.length)return;
      if(S.rView==='edit'&&S.editId){const t=S.tasks.find(t=>t.id===S.editId);if(t){t.name=S.form.name.trim();t.days=[...S.form.days];t.icon=S.form.icon;}}
      else S.tasks.push({id:'t_'+Date.now(),name:S.form.name.trim(),days:[...S.form.days],icon:S.form.icon,createdAt:Date.now()});
      saveR();S.rView='home';S.editId=null;toast('保存しました');break;
    case 'dayT':{const idx=parseInt(el.dataset.idx),i=S.form.days.indexOf(idx);if(i>=0)S.form.days.splice(i,1);else S.form.days.push(idx);S.form.days.sort((a,b)=>a-b);render();}break;
    case 'preset':{const map={all:[0,1,2,3,4,5,6],wd:[0,1,2,3,4],we:[5,6]};S.form.days=map[v];render();}break;
    case 'icon':S.form.icon=v;render();break;
    // Fitness
    case 'dPrev':{const d=parseD(S.fDate);d.setDate(d.getDate()-1);S.fDate=fmtD(d);render();}break;
    case 'dNext':{const d=parseD(S.fDate);d.setDate(d.getDate()+1);S.fDate=fmtD(d);render();}break;
    case 'fTab':S.fTab=v;render();break;
    case 'fWeight':S.fit.weight[S.fDate]=el.value;saveF();break;
    case 'fSet':{const ex=el.dataset.ex,s=el.dataset.s;if(!S.fit.workouts[S.fDate])S.fit.workouts[S.fDate]={};if(!S.fit.workouts[S.fDate][ex])S.fit.workouts[S.fDate][ex]={};S.fit.workouts[S.fDate][ex][s]=el.value;saveF();}break;
    case 'fRun':{const f=el.dataset.f;if(!S.fit.runs[S.fDate])S.fit.runs[S.fDate]={};S.fit.runs[S.fDate][f]=el.value;saveF();if(f==='distance'||f==='duration'){const r=S.fit.runs[S.fDate],dist=parseFloat(r.distance)||0,dur=parseFloat(r.duration)||0;let pace='—';if(dist>0&&dur>0){const pt=dur/dist;pace=`${Math.floor(pt)}:${String(Math.round((pt-Math.floor(pt))*60)).padStart(2,'0')}`;}const pe=document.querySelector('.fit-pace');if(pe)pe.textContent=pace;}}break;
    case 'fMeal':S.fit.meals[S.fDate]=el.value;saveF();break;
    case 'fToday':S.fDate=fmtD(new Date());render();break;
    case 'rPrev':if(S.reportIdx<S.reports.length-1){S.reportIdx++;render();}break;
    case 'rNext':if(S.reportIdx>0){S.reportIdx--;render();}break;
  }
}
render();
</script>
