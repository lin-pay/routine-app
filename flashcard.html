<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palavras">
<meta name="theme-color" content="#0a0a14">
<title>Palavras</title>
<link rel="apple-touch-icon" href="icon-palavras.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--surface:rgba(255,255,255,0.04);--sh:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.06);--text:#e8e8f0;--dim:rgba(255,255,255,0.35);--mid:rgba(255,255,255,0.55);--accent:#4ade80;--aglow:rgba(74,222,128,0.12);--danger:#E05252;--r:14px;--font:'Zen Kaku Gothic New',-apple-system,sans-serif;--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,20px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.app-inner{padding:calc(var(--st) + 12px) 20px calc(var(--sb) + 20px)}
/* Login */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;text-align:center}
.login-icon{font-size:64px;margin-bottom:16px}
.login-title{font-size:28px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:13px;color:var(--dim);margin-bottom:32px;line-height:1.6}
.login-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#333;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.login-btn:active{transform:scale(.95)}
.login-btn img{width:20px;height:20px}
/* Header */
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.date-label{font-size:12px;color:var(--dim);letter-spacing:1.5px;font-weight:500}
.greeting{font-size:22px;font-weight:900;margin-top:4px;background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hbtn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hbtn:active{background:var(--sh)}
/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 8px;text-align:center}
.stat-v{font-size:24px;font-weight:900;color:var(--accent)}
.stat-l{font-size:10px;color:var(--dim);margin-top:4px}
/* Buttons */
.rbtn{width:100%;padding:16px;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;border-radius:12px;color:#0a0a14;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;margin-bottom:12px}
.rbtn:active{transform:scale(.97)}
.rbtn:disabled{opacity:.35}
.lbtn{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--mid);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;text-align:center;margin-bottom:8px}
.lbtn:active{background:var(--sh)}
/* Review Card */
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 20px;text-align:center;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;animation:si .3s ease}
.rcard:active{transform:scale(.98)}
.rcard-lang{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:12px;text-transform:uppercase}
.rcard-word{font-size:28px;font-weight:700;line-height:1.4}
.rcard-note{font-size:13px;color:var(--dim);margin-top:12px;line-height:1.5}
.rcard-ex{font-size:14px;color:var(--text);margin-top:4px;margin-bottom:16px;line-height:1.6;text-align:center}
.rcard-tap{font-size:11px;color:var(--dim);margin-top:20px;opacity:.5}
.prog{font-size:13px;color:var(--dim);text-align:center;margin-bottom:16px}
.rcounts{display:flex;justify-content:center;gap:16px;margin-bottom:16px;font-size:11px;color:var(--dim)}
.rc-item{display:flex;align-items:center;gap:4px}
.rc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rc-d0{background:#E05252}.rc-d1{background:#fbbf24}.rc-d2{background:#4ade80}.rc-d3{background:#60a5fa}
.rc-v{font-weight:700}
/* Ratings */
.ratings{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:20px}
.rate{border:none;border-radius:10px;padding:12px 4px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;text-align:center;line-height:1.3}
.rate:active{transform:scale(.95)}
.r0{background:rgba(224,82,82,.12);color:#E05252;border:1px solid rgba(224,82,82,.15)}
.r1{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.15)}
.r2{background:rgba(74,222,128,.08);color:#4ade80;border:1px solid rgba(74,222,128,.15)}
.r3{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.15)}
.rate-sub{font-size:9px;color:var(--dim);margin-top:2px;display:block}
/* Card List */
.clist{display:flex;flex-direction:column;gap:6px}
.citem{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;position:relative}
.citem-pt{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.citem-ja{font-size:12px;color:var(--dim);flex-shrink:0;margin-left:8px;margin-right:8px}
.citem-due{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;flex-shrink:0;margin-right:4px}
.due-now{background:rgba(74,222,128,.15);color:var(--accent)}
.due-ok{background:var(--sh);color:var(--dim)}
.due-new{background:rgba(96,165,250,.15);color:#60a5fa}
.search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;margin-bottom:12px}
.search:focus{border-color:rgba(74,222,128,.4)}
.search::placeholder{color:var(--dim)}
.cnt{font-size:12px;color:var(--dim);margin-bottom:12px}
/* Done */
.done{text-align:center;padding:40px 20px;animation:fi .5s ease}
.done-i{font-size:48px;margin-bottom:12px}
.done-t{font-size:18px;font-weight:700;margin-bottom:6px}
.done-d{font-size:13px;color:var(--dim);line-height:1.6}
/* Back */
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--dim);font-size:13px;font-family:var(--font);cursor:pointer;margin-bottom:16px;padding:4px 0}
.back:active{color:var(--accent)}
.undo-btn{display:block;margin:12px auto 0;background:none;border:1px solid var(--border);border-radius:10px;padding:8px 20px;color:var(--dim);font-size:12px;font-family:var(--font);cursor:pointer}
.undo-btn:active{background:var(--sh);color:var(--accent)}
/* Form */
.stl{font-size:18px;font-weight:900;margin-bottom:20px}
.ig{margin-bottom:22px}
.il{display:block;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase}
.ti{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;font-family:var(--font);outline:none}
.ti:focus{border-color:rgba(74,222,128,.4)}
.ti::placeholder{color:var(--dim)}
.fa{display:flex;gap:10px;margin-top:28px}
.bc{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--mid);font-size:15px;font-family:var(--font);font-weight:500;cursor:pointer}
.bs{flex:2;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;border-radius:12px;padding:14px;color:#0a0a14;font-size:15px;font-family:var(--font);font-weight:700;cursor:pointer}
.bs:disabled{opacity:.35}
.bc:active{background:var(--sh)}
.fv{animation:su .3s ease}
/* Popup, Backdrop, Toast */
.po{position:absolute;right:10px;bottom:calc(100% + 4px);z-index:20;background:#1a1a28;border:1px solid var(--border);border-radius:12px;padding:4px;box-shadow:0 12px 32px rgba(0,0,0,.5);animation:pi .15s ease;min-width:120px}
.pb{background:none;border:none;font-family:var(--font);font-size:13px;cursor:pointer;padding:10px 16px;border-radius:8px;width:100%;text-align:left;white-space:nowrap;font-weight:500}
.pb.del{color:var(--danger)}.pb.edt{color:var(--text)}.pb:active{background:var(--sh)}
.mb{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 6px;border-radius:8px}
.mb:active{background:var(--sh)}
.bd{position:fixed;inset:0;z-index:15}
.toast{position:fixed;bottom:calc(var(--sb) + 30px);left:50%;transform:translateX(-50%);background:rgba(26,26,40,.95);border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--accent);z-index:60;white-space:nowrap;animation:ti .3s ease}
/* FAB */
.fab{position:fixed;bottom:calc(var(--sb) + 20px);right:24px;width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;color:#0a0a14;font-size:28px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(74,222,128,.3);z-index:30;animation:pi .4s ease .2s both}
.fab:active{transform:scale(.92)}
/* Empty */
.empty{text-align:center;padding:50px 20px;animation:fi .5s ease}
.ei{font-size:48px;margin-bottom:12px}
.et{font-size:17px;font-weight:700;margin-bottom:6px}
.ed{font-size:13px;color:var(--dim);line-height:1.5}
/* Spinner */
.lw{display:flex;align-items:center;justify-content:center;height:100vh}
.sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sn .8s linear infinite}
/* Animations */
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pi{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes ti{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes sn{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import{getAuth,signInWithPopup,signInWithRedirect,getRedirectResult,GoogleAuthProvider,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import{getFirestore,initializeFirestore,persistentLocalCache,doc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const fbApp=initializeApp({apiKey:"AIzaSyDlttoYqI42olx_khQY2MbxAgQcozD57p4",authDomain:"routine-app-5eff3.firebaseapp.com",projectId:"routine-app-5eff3",storageBucket:"routine-app-5eff3.firebasestorage.app",messagingSenderId:"282023583014",appId:"1:282023583014:web:4669d57d2ddcce7146f5e7"});
const auth=getAuth(fbApp);
let db;try{db=initializeFirestore(fbApp,{localCache:persistentLocalCache()});}catch(e){db=getFirestore(fbApp);}

// ── State ──
let S={
  user:null,authOk:false,dataOk:false,
  cards:[],view:'home',flipped:false,idx:0,queue:[],search:'',
  pop:null,editId:null,form:{pt:'',ja:'',note:'',ex:''},rcounts:[0,0,0,0],
  toast:null,unsub:[],lastRating:null
};
let toastT;

// ── Helpers ──
function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function loadRC(){try{const s=localStorage.getItem('palavras_rc');if(s){const d=JSON.parse(s);if(d.date===fmtD(new Date())){S.rcounts=d.counts;return;}}S.rcounts=[0,0,0,0];}catch(e){S.rcounts=[0,0,0,0];}}
function saveRC(){try{localStorage.setItem('palavras_rc',JSON.stringify({date:fmtD(new Date()),counts:S.rcounts}));}catch(e){}}
function parseD(s){const[y,m,d]=s.split('-');return new Date(y,m-1,d);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m){S.toast=m;render();clearTimeout(toastT);toastT=setTimeout(()=>{S.toast=null;render();},1800);}
function dlabel(){const d=new Date(),DN=['日','月','火','水','木','金','土'];return `${d.getMonth()+1}月${d.getDate()}日（${DN[d.getDay()]}）`;}

// ── SM-2 Spaced Repetition ──
function sm2(card,rating){
  let ef=card.ef||2.5,iv=card.interval||0,reps=card.reps||0;
  if(rating===0){reps=0;iv=1;}
  else{
    if(reps===0){iv=rating===3?3:rating===2?1:1;}
    else if(reps===1)iv=3;
    else iv=Math.round(iv*ef);
    const q=rating+2;
    ef=ef+(0.1-(5-q)*(0.08+(5-q)*0.02));
    if(ef<1.3)ef=1.3;
    reps++;
    if(reps>1){if(rating===1)iv=Math.max(1,Math.round(iv*0.8));else if(rating===3)iv=Math.round(iv*1.3);}
  }
  const d=new Date();d.setDate(d.getDate()+iv);
  return{ef:Math.round(ef*100)/100,interval:iv,reps,nextReview:fmtD(d)};
}
function ivLabel(days){if(days<=0)return'<1日';if(days===1)return'1日';if(days<30)return days+'日';if(days<365)return Math.round(days/30)+'ヶ月';return Math.round(days/365)+'年';}
function preview(card,rev,rating){const src=rev?{ef:card.rEf||2.5,interval:card.rInterval||0,reps:card.rReps||0}:card;return ivLabel(sm2(src,rating).interval);}
function getDue(){const today=fmtD(new Date());const due=[];S.cards.forEach(c=>{if(!c.nextReview||c.nextReview<=today)due.push({card:c,rev:false});if(c.rNextReview&&c.rNextReview<=today)due.push({card:c,rev:true});});return due;}
function dueLabel(card){
  if(!card.nextReview)return{text:'NEW',cls:'due-new'};
  const today=fmtD(new Date());
  if(card.nextReview<=today)return{text:'復習',cls:'due-now'};
  const diff=Math.round((parseD(card.nextReview)-new Date())/(1000*60*60*24));
  return{text:diff+'日後',cls:'due-ok'};
}

// ── Firebase ──
let saving=false;
function startSync(uid){
  S.unsub.forEach(u=>u());S.unsub=[];
  S.unsub.push(onSnapshot(doc(db,'users',uid,'data','flashcards'),s=>{
    if(saving)return;
    if(s.exists())S.cards=s.data().cards||[];
    S.dataOk=true;
    if(S.view!=='review')render();
  }));
}
async function save(){if(!S.user)return;saving=true;try{await setDoc(doc(db,'users',S.user.uid,'data','flashcards'),{cards:S.cards});}catch(e){toast('⚠ 保存失敗 — ネット接続を確認');}finally{saving=false;}}
onAuthStateChanged(auth,u=>{S.user=u;S.authOk=true;if(u)startSync(u.uid);else{S.dataOk=false;S.cards=[];render();}});
getRedirectResult(auth).catch(()=>{});
async function login(){const p=new GoogleAuthProvider();try{await signInWithPopup(auth,p);}catch(e){if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user')await signInWithRedirect(auth,p);}}
async function logout(){S.unsub.forEach(u=>u());S.unsub=[];await signOut(auth);}

// ── Render ──
function render(){
  const a=document.getElementById('app');
  if(!S.authOk){a.innerHTML='<div class="lw"><div class="sp"></div></div>';return;}
  if(!S.user){a.innerHTML=renderLogin();bind();return;}
  if(!S.dataOk){a.innerHTML=renderHome();bind();return;}
  let html='';
  if(S.view==='review')html=renderReview();
  else if(S.view==='list')html=renderList();
  else if(S.view==='add'||S.view==='edit')html=renderForm();
  else html=renderHome();
  if(S.toast)html+=`<div class="toast">${esc(S.toast)}</div>`;
  a.innerHTML=html;
  bind();
}

function renderLogin(){
  return `<div class="login-wrap"><div class="login-icon">🇧🇷</div><div class="login-title">Palavras</div><div class="login-sub">ポルトガル語フラッシュカード<br>忘却曲線に基づく最適な復習タイミング</div><button class="login-btn" data-a="login"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">Googleでログイン</button></div>`;
}

function renderHome(){
  const due=getDue(),total=S.cards.length;
  const mastered=S.cards.filter(c=>(c.interval||0)>=30).length;
  return `<div class="app-inner">
    <div class="header"><div><div class="date-label">${dlabel()}</div><div class="greeting">Palavras</div></div><button class="hbtn" data-a="logout" title="ログアウト">↗</button></div>
    <div class="stats">
      <div class="stat"><div class="stat-v">${due.length}</div><div class="stat-l">復習待ち</div></div>
      <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">総カード</div></div>
      <div class="stat"><div class="stat-v">${mastered}</div><div class="stat-l">習得済み</div></div>
    </div>
    <button class="rbtn" data-a="start" ${due.length?'':'disabled'}>${due.length?`🧠 ${due.length}枚を復習する`:'復習するカードはありません'}</button>
    <button class="lbtn" data-a="list">📋 カード一覧（${total}枚）</button>
    ${!total?`<div class="empty"><div class="ei">🇧🇷</div><div class="et">カードを追加しましょう</div><div class="ed">＋ボタンからポルトガル語の<br>フラッシュカードを追加できます</div></div>`:''}
  </div><button class="fab" data-a="add">＋</button>`;
}

function renderReview(){
  if(S.idx>=S.queue.length)return renderDone();
  const entry=S.queue[S.idx];
  const card=S.cards.find(c=>c.id===entry.id);
  if(!card)return renderDone();
  const fl=S.flipped,rev=entry.rev;
  const front=rev?card.ja:card.pt,back=rev?card.pt:card.ja;
  const fLang=rev?'日本語':'Português',bLang=rev?'Português':'日本語';
  return `<div class="app-inner">
    <button class="back" data-a="home">← やめる</button>
    <div class="prog">${S.idx+1} / ${S.queue.length}</div>
    <div class="rcard" data-a="flip">
      <div class="rcard-lang">${fl?bLang:fLang}</div>
      <div class="rcard-word">${fl?esc(back):esc(front)}</div>
      ${fl&&card.note?`<div class="rcard-note">${esc(card.note)}</div>`:''}
      ${!fl?'<div class="rcard-tap">タップして答えを見る</div>':''}
    </div>
    ${fl?`<div class="ratings">
      <button class="rate r0" data-a="rate" data-v="0">もう一度<span class="rate-sub">${preview(card,rev,0)}</span></button>
      <button class="rate r1" data-a="rate" data-v="1">難しい<span class="rate-sub">${preview(card,rev,1)}</span></button>
      <button class="rate r2" data-a="rate" data-v="2">良い<span class="rate-sub">${preview(card,rev,2)}</span></button>
      <button class="rate r3" data-a="rate" data-v="3">簡単<span class="rate-sub">${preview(card,rev,3)}</span></button>
    </div>`:''}
    ${S.rcounts.some(v=>v>0)?`<div class="rcounts">
      <div class="rc-item"><span class="rc-dot rc-d0"></span><span class="rc-v">${S.rcounts[0]}</span></div>
      <div class="rc-item"><span class="rc-dot rc-d1"></span><span class="rc-v">${S.rcounts[1]}</span></div>
      <div class="rc-item"><span class="rc-dot rc-d2"></span><span class="rc-v">${S.rcounts[2]}</span></div>
      <div class="rc-item"><span class="rc-dot rc-d3"></span><span class="rc-v">${S.rcounts[3]}</span></div>
    </div>`:''}
    ${fl&&card.ex?`<div class="rcard-ex">${esc(card.ex)}</div>`:''}
    ${!fl&&S.lastRating?`<button class="undo-btn" data-a="undo">↩ 1つ戻す</button>`:''}
  </div>`;
}

function renderDone(){
  const n=S.queue.length,rc=S.rcounts;
  return `<div class="app-inner">
    <div class="done">
      <div class="done-i">🎉</div>
      <div class="done-t">復習完了！</div>
      <div class="done-d">${n}枚のカードを復習しました</div>
    </div>
    <div class="rcounts" style="justify-content:center;gap:20px;margin:20px 0;font-size:13px">
      <div class="rc-item"><span class="rc-dot rc-d0"></span>もう一度 <span class="rc-v">${rc[0]}</span></div>
      <div class="rc-item"><span class="rc-dot rc-d1"></span>難しい <span class="rc-v">${rc[1]}</span></div>
      <div class="rc-item"><span class="rc-dot rc-d2"></span>良い <span class="rc-v">${rc[2]}</span></div>
      <div class="rc-item"><span class="rc-dot rc-d3"></span>簡単 <span class="rc-v">${rc[3]}</span></div>
    </div>
    ${S.lastRating?`<button class="lbtn" data-a="undo" style="margin-bottom:12px">↩ 最後の評価を取り消す</button>`:''}
    <button class="rbtn" data-a="home">ホームに戻る</button>
  </div>`;
}

function renderList(){
  const q=S.search.toLowerCase();
  let cards=[...S.cards];
  if(q)cards=cards.filter(c=>c.pt.toLowerCase().includes(q)||c.ja.includes(q)||(c.note||'').toLowerCase().includes(q));
  const today=fmtD(new Date());
  cards.sort((a,b)=>{
    const ad=!a.nextReview||a.nextReview<=today?0:1;
    const bd=!b.nextReview||b.nextReview<=today?0:1;
    if(ad!==bd)return ad-bd;
    return(a.nextReview||'').localeCompare(b.nextReview||'');
  });
  return `<div class="app-inner">
    <button class="back" data-a="home">← 戻る</button>
    <div class="stl">カード一覧</div>
    <input class="search" id="srch" value="${esc(S.search)}" placeholder="検索...">
    <div class="cnt">${cards.length}枚</div>
    <div class="clist">${cards.length?cards.map(c=>{
      const dl=dueLabel(c);
      return `<div class="citem" style="${S.pop===c.id?'z-index:20':''}">
        <div class="citem-pt">${esc(c.pt)}</div>
        <div class="citem-ja">${esc(c.ja)}</div>
        <span class="citem-due ${dl.cls}">${dl.text}</span>
        <button class="mb" data-a="more" data-id="${c.id}">⋯</button>
        ${S.pop===c.id?`<div class="po"><button class="pb edt" data-a="edit" data-id="${c.id}">✏️ 編集</button><button class="pb del" data-a="del" data-id="${c.id}">🗑 削除</button></div>`:''}
      </div>`;
    }).join(''):`<div class="empty"><div class="ei">📚</div><div class="et">カードがありません</div><div class="ed">＋ボタンから追加しましょう</div></div>`}</div>
  </div><button class="fab" data-a="add">＋</button>${S.pop?'<div class="bd" data-a="closepop"></div>':''}`;
}

function renderForm(){
  const e=S.view==='edit',f=S.form;
  return `<div class="app-inner fv">
    <div class="stl">${e?'カードを編集':'新しいカード'}</div>
    <div class="ig"><label class="il">ポルトガル語</label><input class="ti" id="fpt" value="${esc(f.pt)}" placeholder="例: Obrigado" autofocus></div>
    <div class="ig"><label class="il">日本語</label><input class="ti" id="fja" value="${esc(f.ja)}" placeholder="例: ありがとう"></div>
    <div class="ig"><label class="il">メモ（任意）</label><input class="ti" id="fnote" value="${esc(f.note)}" placeholder="例: Thank you / 品詞など"></div>
    <div class="ig"><label class="il">例文（任意）</label><input class="ti" id="fex" value="${esc(f.ex)}" placeholder="例: Muito obrigado pela ajuda"></div>
    <div class="fa"><button class="bc" data-a="cancel">キャンセル</button><button class="bs" data-a="save" ${f.pt.trim()&&f.ja.trim()?'':'disabled'}>${e?'保存する':'追加する'}</button></div>
  </div>`;
}

// ── Events ──
function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>el.addEventListener('click',handleA));
  const fpt=document.getElementById('fpt'),fja=document.getElementById('fja'),fnote=document.getElementById('fnote');
  if(fpt)fpt.addEventListener('input',e=>{S.form.pt=e.target.value;updBtn();});
  if(fja)fja.addEventListener('input',e=>{S.form.ja=e.target.value;updBtn();});
  if(fnote)fnote.addEventListener('input',e=>{S.form.note=e.target.value;});
  const fex=document.getElementById('fex');
  if(fex)fex.addEventListener('input',e=>{S.form.ex=e.target.value;});
  const srch=document.getElementById('srch');
  if(srch)srch.addEventListener('input',e=>{S.search=e.target.value;render();});
}
function updBtn(){const b=document.querySelector('[data-a="save"]');if(b)b.disabled=!(S.form.pt.trim()&&S.form.ja.trim());}

function handleA(e){
  const el=e.currentTarget,a=el.dataset.a,id=el.dataset.id,v=el.dataset.v;
  switch(a){
    case 'login':login();break;
    case 'logout':logout();break;
    case 'home':S.view='home';S.pop=null;render();break;
    case 'start':{
      const due=getDue();
      const reviewed=due.filter(d=>{const c=d.card;return d.rev?(c.rReps||0)>0||(c.rInterval||0)>0:c.reps>0||c.interval>0;}).sort(()=>Math.random()-.5);
      const fresh=due.filter(d=>{const c=d.card;return d.rev?!(c.rReps||0)&&!(c.rInterval||0):!c.reps&&!c.interval;}).sort(()=>Math.random()-.5);
      S.queue=[...reviewed,...fresh].map(d=>({id:d.card.id,rev:d.rev}));
      S.idx=0;S.flipped=false;S.lastRating=null;S.view='review';render();
    }break;
    case 'flip':S.flipped=true;render();break;
    case 'rate':{
      const entry=S.queue[S.idx];
      const card=S.cards.find(c=>c.id===entry.id);
      if(card){const r=parseInt(v);
        S.lastRating={idx:S.idx,rating:r,snap:{ef:card.ef,interval:card.interval,reps:card.reps,nextReview:card.nextReview,rEf:card.rEf,rInterval:card.rInterval,rReps:card.rReps,rNextReview:card.rNextReview}};
        S.rcounts[r]++;saveRC();
        if(entry.rev){const src={ef:card.rEf||2.5,interval:card.rInterval||0,reps:card.rReps||0};const upd=sm2(src,r);card.rEf=upd.ef;card.rInterval=upd.interval;card.rReps=upd.reps;card.rNextReview=upd.nextReview;}
        else{const upd=sm2(card,r);Object.assign(card,upd);if(r>=2&&!card.rNextReview){const d=new Date();d.setDate(d.getDate()+1);card.rNextReview=fmtD(d);}}
        save();}
      S.idx++;S.flipped=false;render();
    }break;
    case 'list':S.view='list';S.search='';S.pop=null;render();break;
    case 'add':S.form={pt:'',ja:'',note:'',ex:''};S.editId=null;S.view='add';render();break;
    case 'edit':{
      const c=S.cards.find(c=>c.id===id);
      if(c){S.form={pt:c.pt,ja:c.ja,note:c.note||'',ex:c.ex||''};S.editId=id;S.view='edit';S.pop=null;render();}
    }break;
    case 'del':S.cards=S.cards.filter(c=>c.id!==id);S.pop=null;save();toast('削除しました');break;
    case 'more':e.stopPropagation();S.pop=S.pop===id?null:id;render();break;
    case 'closepop':S.pop=null;render();break;
    case 'save':
      if(!S.form.pt.trim()||!S.form.ja.trim())return;
      if(S.view==='edit'&&S.editId){
        const c=S.cards.find(c=>c.id===S.editId);
        if(c){c.pt=S.form.pt.trim();c.ja=S.form.ja.trim();c.note=S.form.note.trim();c.ex=S.form.ex.trim();}
      }else{
        S.cards.push({id:'fc_'+Date.now(),pt:S.form.pt.trim(),ja:S.form.ja.trim(),note:S.form.note.trim(),ex:S.form.ex.trim(),ef:2.5,interval:0,reps:0,nextReview:fmtD(new Date()),rEf:2.5,rInterval:0,rReps:0,rNextReview:fmtD(new Date()),createdAt:Date.now()});
      }
      save();S.view=S.editId?'list':'home';S.editId=null;toast('保存しました');
    break;
    case 'undo':{
      const lr=S.lastRating;if(!lr)break;
      const entry=S.queue[lr.idx];
      const card=S.cards.find(c=>c.id===entry.id);
      if(card)Object.assign(card,lr.snap);
      S.rcounts[lr.rating]--;saveRC();
      S.idx=lr.idx;S.flipped=false;S.lastRating=null;save();render();
    }break;
    case 'cancel':S.view=S.editId?'list':'home';S.editId=null;render();break;
  }
}

loadRC();
render();
</script>
</body>
</html>
