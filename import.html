<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a14">
<title>Palavras - 一括インポート</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e8e8f0;font-family:'Zen Kaku Gothic New',-apple-system,sans-serif;max-width:480px;margin:0 auto;padding:20px;min-height:100vh}
h1{font-size:20px;font-weight:900;background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:24px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:12px}
.btn-g{background:linear-gradient(135deg,#4ade80,#22c55e);color:#0a0a14}
.btn-w{background:#fff;color:#333;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-w img{width:20px;height:20px}
.btn:disabled{opacity:.35}
.btn:active{transform:scale(.97)}
.stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.stat-c{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 8px;text-align:center}
.stat-v{font-size:22px;font-weight:900;color:#4ade80}
.stat-l{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px}
.log{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-top:16px;font-size:12px;color:rgba(255,255,255,.55);max-height:200px;overflow-y:auto;line-height:1.8}
.ok{color:#4ade80}.err{color:#E05252}
.prog{width:100%;height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:#4ade80;border-radius:3px;transition:width .3s}
.hide{display:none}
</style>
</head>
<body>
<h1>🇧🇷 Palavras 一括インポート</h1>
<div class="sub" id="status">ログインして単語をインポートします</div>
<div id="loginArea"><button class="btn btn-w" id="loginBtn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">Googleでログイン</button></div>
<div id="mainArea" class="hide">
<div class="stat">
<div class="stat-c"><div class="stat-v" id="totalWords">-</div><div class="stat-l">インポート語数</div></div>
<div class="stat-c"><div class="stat-v" id="existWords">-</div><div class="stat-l">既存カード</div></div>
<div class="stat-c"><div class="stat-v" id="newWords">-</div><div class="stat-l">新規追加</div></div>
</div>
<div class="prog hide" id="progWrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
<button class="btn btn-g" id="importBtn">インポート開始</button>
<div class="log hide" id="log"></div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import{getAuth,signInWithPopup,signInWithRedirect,GoogleAuthProvider,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const fbApp=initializeApp({apiKey:"AIzaSyDlttoYqI42olx_khQY2MbxAgQcozD57p4",authDomain:"routine-app-5eff3.firebaseapp.com",projectId:"routine-app-5eff3",storageBucket:"routine-app-5eff3.firebasestorage.app",messagingSenderId:"282023583014",appId:"1:282023583014:web:4669d57d2ddcce7146f5e7"});
const auth=getAuth(fbApp),db=getFirestore(fbApp);

// ── Word Data (loaded from external JSON) ──
const RAW=await fetch('words.json?v='+Date.now()).then(r=>r.json());

// ── Helpers ──
function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
const statusEl=document.getElementById('status');
const logEl=document.getElementById('log');
function log(msg,cls){logEl.classList.remove('hide');logEl.innerHTML+=`<div class="${cls||''}">${msg}</div>`;logEl.scrollTop=logEl.scrollHeight;}

// ── Auth ──
document.getElementById('loginBtn').addEventListener('click',async()=>{
  const p=new GoogleAuthProvider();
  try{await signInWithPopup(auth,p);}catch(e){
    if(e.code==='auth/popup-blocked')await signInWithRedirect(auth,p);
    else statusEl.textContent='ログインエラー: '+e.message;
  }
});

onAuthStateChanged(auth,async u=>{
  if(!u)return;
  document.getElementById('loginArea').classList.add('hide');
  document.getElementById('mainArea').classList.remove('hide');
  statusEl.textContent=`${u.displayName} でログイン中`;

  // Read existing cards
  const docRef=doc(db,'users',u.uid,'data','flashcards');
  const snap=await getDoc(docRef);
  const existing=snap.exists()?(snap.data().cards||[]):[];
  const existPT=new Set(existing.map(c=>c.pt.toLowerCase().trim()));

  // Dedup import data
  const seen=new Set();
  const newWords=RAW.filter(w=>{
    const key=w[0].toLowerCase().trim();
    if(seen.has(key)||existPT.has(key))return false;
    seen.add(key);
    return true;
  });

  document.getElementById('totalWords').textContent=RAW.length;
  document.getElementById('existWords').textContent=existing.length;
  document.getElementById('newWords').textContent=newWords.length;

  document.getElementById('importBtn').addEventListener('click',async()=>{
    const btn=document.getElementById('importBtn');
    btn.disabled=true;
    btn.textContent='インポート中...';
    const progWrap=document.getElementById('progWrap');
    const progBar=document.getElementById('progBar');
    progWrap.classList.remove('hide');

    const today=fmtD(new Date());
    // Update existing cards with examples
    const rawMap=new Map();RAW.forEach(w=>rawMap.set(w[0].toLowerCase().trim(),w));
    let exUpdated=0;
    existing.forEach(card=>{
      const m=rawMap.get(card.pt.toLowerCase().trim());
      if(m&&m[3]&&!card.ex){card.ex=m[3];exUpdated++;}
    });
    const cards=newWords.map((w,i)=>({
      id:'fc_'+Date.now()+'_'+i+'_'+Math.random().toString(36).slice(2,6),
      pt:w[0],ja:w[1],note:w[2]||'',ex:w[3]||'',
      ef:2.5,interval:0,reps:0,
      nextReview:today,rEf:2.5,rInterval:0,rReps:0,rNextReview:today,createdAt:Date.now()+i
    }));

    const allCards=[...existing,...cards];
    try{
      await setDoc(docRef,{cards:allCards});
      progBar.style.width='100%';
      let msg=`✓ ${cards.length}枚の新規カードをインポート`;
      if(exUpdated>0)msg+=`、${exUpdated}枚に例文を追加`;
      msg+=`（合計${allCards.length}枚）`;
      log(msg,'ok');
      btn.textContent='完了！';
    }catch(e){
      log('✗ エラー: '+e.message,'err');
      btn.textContent='エラー';
      btn.disabled=false;
    }
  });
});
</script>
</body>
</html>
